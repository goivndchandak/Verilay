<!DOCTYPE html>
<html>
<head>
  <title>Verilay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0B1F3A;
      color: white;
    }

    .container {
      padding: 60px 20px;
      text-align: centre;
    }

    .hero h1 {
      font-size: 44px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      colour: #ccc;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      margin: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .primary {
      background: #F59E0B;
      colour: black;
    }

    .secondary {
      background: transparent;
      border: 1px solid white;
      colour: white;
    }

    .card {
      background: white;
      colour: black;
      padding: 20px;
      border-radius: 16px;
      width: 300px;
      margin: auto;
      margin-top: 40px;
    }

    .section {
      padding: 60px 20px;
      background: #F8FAFC;
      colour: black;
    }

    .steps {
      display: flex;
      flex-wrap: wrap;
      justify-content: centre;
      gap: 20px;
    }

    .step {
      width: 250px;
      padding: 20px;
      border-radius: 12px;
      background: white;
    }
  </style>
</head>

<body>

<div class="container hero">
  <h1>Control your narrative.</h1>
  <p>Accept, Modify or Deny any statement about you.</p>

  <button class="btn primary" onclick="window.location='signup.html'">
    Get Started Free
  </button>

  <button class="btn secondary" onclick="window.location='feed.html'">
    View Demo
  </button>

  <div class="card">
    <b>✅ ACCEPTED</b>
    <p>"Partnership confirmed"</p>
    <small>— @username</small>
  </div>
</div>

<div class="section">
  <h2 style="text-align:center;">How It Works</h2>

  <div class="steps">

    <div class="step">
      <h3>Post</h3>
      <p>Create or scan a statement</p>
    </div>

    <div class="step">
      <h3>React</h3>
      <p>Accept, Modify or Deny</p>
    </div>

    <div class="step">
      <h3>Share</h3>
      <p>Generate Verilay Card</p>
    </div>

  </div>
</div>

</body>
</html>
