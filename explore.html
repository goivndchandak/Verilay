<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Explore - Verilay</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
  margin: 0;
  font-family: Arial;
  background:#fafafa;
}

.topbar {
  background:#1d3557;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:20px;
  font-weight:bold;
}

.container {
  padding:15px;
}

input {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  margin-bottom:15px;
}

.user {
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.name {
  font-weight:bold;
  color:#1d3557;
}

.username {
  font-size:12px;
  color:#666;
}

.btn {
  margin-top:8px;
  padding:6px 12px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  color:white;
}

.follow { background:#1d3557; }
.unfollow { background:#aaa; }

.bottomnav {
 position:fixed;
 bottom:0;
 left:0;
 right:0;
 background:#fff4e6;
 display:flex;
 justify-content:space-around;
 height:60px;
 align-items:center;
}

</style>
</head>

<body>

<div class="topbar">
  Explore
  <a href="feed.html" style="color:white;font-size:12px;">Back</a>
</div>

<div class="container">

<input placeholder="Search users..." onkeyup="search(this.value)">

<div id="results"></div>

</div>

<div class="bottomnav">
  <a href="feed.html">🏠</a>
  <a href="dashboard.html">👤</a>
</div>

<script src="js/api.js"></script>

<script>

let following = [];

/* ---------- LOAD FOLLOWING ---------- */
async function loadFollowing(){
  const res = await getFollowing();
  const list = res.response.results || [];
  following = list.map(f => f.following);
}

/* ---------- SEARCH USERS ---------- */
async function search(query){

  if(query.length < 2){
    document.getElementById("results").innerHTML = "";
    return;
  }

  const res = await searchUsers(query);
  const users = res.response.results || [];

  let html = "";

  users.forEach(u => {

    const isFollowed = following.includes(u._id);

    html += `
      <div class="user">
        <div class="name">${u.full_name}</div>
        <div class="username">@${u.username}</div>

        <button class="btn ${isFollowed ? 'unfollow':'follow'}"
          onclick="${isFollowed ? `unfollow('${u._id}')` : `follow('${u._id}')`}">
          ${isFollowed ? "Following":"Follow"}
        </button>
      </div>
    `;
  });

  document.getElementById("results").innerHTML = html;
}

/* ---------- FOLLOW ---------- */
async function follow(id){
  await followUser(id);
  loadFollowing();
  alert("Followed");
}

/* ---------- UNFOLLOW ---------- */
async function unfollow(id){
  // find follow record
  const res = await getFollowing();
  const list = res.response.results || [];

  const f = list.find(x => x.following === id);
  if(f){
    await unfollowUser(f._id);
  }

  loadFollowing();
  alert("Unfollowed");
}

/* ---------- INIT ---------- */
loadFollowing();

</script>

</body>
</html>
