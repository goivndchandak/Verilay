<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Explore - Verilay</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: #f5f5f5;
  padding-bottom: 70px;
  color: #1a1a1a;
}

.topbar {
  background: #1d3557; color: white;
  padding: 15px 20px; font-size: 20px; font-weight: bold;
  display: flex; justify-content: space-between; align-items: center;
}
.topbar a {
  color: white; border: 1px solid rgba(255,255,255,0.4);
  padding: 6px 14px; border-radius: 6px;
  font-size: 12px; text-decoration: none;
}

.container { max-width: 600px; margin: auto; padding: 14px; }

/* SEARCH */
.search-row {
  display: flex; gap: 8px; margin-bottom: 14px;
}
.search-row input {
  flex: 1; padding: 12px 14px; border: 1px solid #ddd;
  border-radius: 10px; font-size: 14px; outline: none;
}
.search-row input:focus { border-color: #1d3557; }
.search-btn {
  padding: 12px 20px; border: none; border-radius: 10px;
  background: #1d3557; color: white; font-weight: bold;
  font-size: 14px; cursor: pointer;
}

/* USER CARD */
.user-card {
  background: white; padding: 14px; margin-bottom: 10px;
  border-radius: 12px; border: 1px solid rgba(0,0,0,0.06);
  display: flex; align-items: center; gap: 12px;
}
.user-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: #e8ecf0; color: #1d3557; font-size: 18px; font-weight: bold;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0;
}
.user-avatar img { width: 100%; height: 100%; object-fit: cover; }
.user-info { flex: 1; }
.user-name { font-weight: 700; color: #1d3557; font-size: 15px; }
.user-username { font-size: 12px; color: #999; margin-top: 2px; }
.user-bio { font-size: 12px; color: #666; margin-top: 3px; line-height: 1.3; }

/* FOLLOW BUTTON */
.follow-btn {
  padding: 8px 18px; border-radius: 8px; font-size: 13px;
  font-weight: 700; cursor: pointer; border: none;
  white-space: nowrap; flex-shrink: 0;
}
.follow-btn.follow {
  background: #1d3557; color: white;
}
.follow-btn.following {
  background: white; color: #1d3557;
  border: 1.5px solid #1d3557;
}

.you-label {
  font-size: 12px; color: #999; font-style: italic;
}

.muted { color: #999; font-size: 13px; text-align: center; padding: 20px; }
.error { color: #c0392b; font-size: 12px; margin-top: 8px; }

/* BOTTOM NAV */
.bottomnav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff4e6; display: flex; justify-content: space-around;
  align-items: center; height: 60px; border-top: 1px solid #eee;
}
.bottomnav a { text-decoration: none; text-align: center; color: #999; font-size: 11px; }
.bottomnav a.active { color: #1d3557; font-weight: bold; }
.bottomnav a span { font-size: 22px; display: block; }
</style>
</head>

<body>

<div class="topbar">
  Explore
  <a href="feed.html">← Feed</a>
</div>

<div class="container">
  <div class="search-row">
    <input id="searchInput" placeholder="Search by name or username..." />
    <button class="search-btn" onclick="runSearch()">Search</button>
  </div>
  <div id="searchError" class="error"></div>
  <div id="results"><div class="muted">Search for users to follow</div></div>
</div>

<div class="bottomnav">
  <a href="feed.html"><span>🏠</span>Feed</a>
  <a href="dashboard.html"><span>👤</span>Profile</a>
</div>

<script src="js/api.js"></script>
<script>

if (!localStorage.getItem("token")) window.location.href = "login.html";

const myUserId = getUserId();
let followingIds = [];

function escapeHtml(str) {
  return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

/* ========== LOAD FOLLOWING LIST ========== */
async function loadFollowing(){
  try {
    const res = await getFollowing();
    const list = (res.response && res.response.results) ? res.response.results : [];
    followingIds = list.map(x => x.following);
  } catch(e){ followingIds = []; }
}

/* ========== SEARCH BY NAME ========== */
async function searchByName(query){
  const constraints = JSON.stringify([
    { key: "full_name", constraint_type: "text contains", value: query }
  ]);
  const url = DATA_BASE + "/User?constraints=" + encodeURIComponent(constraints) + "&limit=20";
  const res = await fetch(url, { method: "GET", headers: authHeaders() });
  const data = await res.json();
  return (data.response && data.response.results) ? data.response.results : [];
}

/* ========== SEARCH BY USERNAME ========== */
async function searchByUsername(query){
  const q = query.replace(/^@/, "");
  const constraints = JSON.stringify([
    { key: "username", constraint_type: "text contains", value: q }
  ]);
  const url = DATA_BASE + "/User?constraints=" + encodeURIComponent(constraints) + "&limit=20";
  const res = await fetch(url, { method: "GET", headers: authHeaders() });
  const data = await res.json();
  return (data.response && data.response.results) ? data.response.results : [];
}

/* ========== RUN SEARCH ========== */
async function runSearch(){
  const q = document.getElementById("searchInput").value.trim();
  document.getElementById("searchError").innerText = "";

  if (q.length < 2) {
    document.getElementById("results").innerHTML =
      "<div class='muted'>Type at least 2 characters</div>";
    return;
  }

  document.getElementById("results").innerHTML = "<div class='muted'>Searching...</div>";

  try {
    // Search both name and username
    const [byName, byUsername] = await Promise.all([
      searchByName(q),
      searchByUsername(q)
    ]);

    // Merge unique by _id
    const map = {};
    [...byName, ...byUsername].forEach(u => { if (u && u._id) map[u._id] = u; });
    const users = Object.values(map);

    if (users.length === 0) {
      document.getElementById("results").innerHTML =
        "<div class='user-card'><div class='muted' style='width:100%;'>User not available. Try a different name.</div></div>";
      return;
    }

    let html = "";

    users.forEach(u => {
      const isMe = (String(u._id) === String(myUserId));
      const isFollowing = followingIds.includes(u._id);

      // Avatar
      let avatarHtml = "";
      if (u.profile_picture_url) {
        avatarHtml = "<div class='user-avatar'><img src='" + escapeHtml(u.profile_picture_url) + "'></div>";
      } else {
        avatarHtml = "<div class='user-avatar'>" + escapeHtml((u.full_name || "?").charAt(0)) + "</div>";
      }

      html += "<div class='user-card'>";
      html += avatarHtml;

      html += "<div class='user-info'>";
      html += "<div class='user-name'>" + escapeHtml(u.full_name || "User") + "</div>";
      if (u.username) html += "<div class='user-username'>@" + escapeHtml(u.username) + "</div>";
      if (u.bio) html += "<div class='user-bio'>" + escapeHtml(u.bio) + "</div>";
      html += "</div>";

      if (isMe) {
        html += "<span class='you-label'>You</span>";
      } else {
        html += "<button class='follow-btn " + (isFollowing ? "following" : "follow") + "'"
          + " onclick=\"toggleFollow('" + u._id + "')\">"
          + (isFollowing ? "Following" : "Follow")
          + "</button>";
      }

      html += "</div>";
    });

    document.getElementById("results").innerHTML = html;

  } catch(e){
    document.getElementById("searchError").innerText = "Search error: " + (e.message || e);
  }
}

/* ========== FOLLOW / UNFOLLOW ========== */
async function toggleFollow(targetId){
  try {
    if (followingIds.includes(targetId)){
      // Unfollow
      const res = await getFollowing();
      const list = (res.response && res.response.results) ? res.response.results : [];
      const row = list.find(x => String(x.following) === String(targetId));
      if (row && row._id) await unfollowUser(row._id);
    } else {
      // Follow
      await followUser(targetId);
    }
    await loadFollowing();
    await runSearch(); // refresh UI
  } catch(e){
    alert("Error: " + (e.message || e));
  }
}

// Enter key triggers search
document.getElementById("searchInput").addEventListener("keydown", function(e){
  if (e.key === "Enter") runSearch();
});

loadFollowing();

</script>
</body>
</html>
