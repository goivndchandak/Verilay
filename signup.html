<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - Verilay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #faf5eb; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { background: #1d3557; padding: 16px 20px; text-align: center; border-bottom: 4px solid #FF9933; }
    .topbar a { color: #FF9933; font-size: 22px; font-weight: bold; letter-spacing: 4px; text-decoration: none; }
    .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card {
      background: white; border-radius: 16px; padding: 40px 30px;
      max-width: 400px; width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center;
    }
    .card h2 { color: #1d3557; font-size: 24px; margin-bottom: 8px; }
    .card p { color: #999; font-size: 13px; margin-bottom: 25px; line-height: 1.5; }
    .spinner {
      width: 40px; height: 40px; border: 4px solid #eee;
      border-top: 4px solid #FF9933; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .btn {
      display: inline-block; padding: 14px 30px;
      background: #FF9933; color: white; border: none;
      border-radius: 10px; font-size: 16px; font-weight: bold;
      cursor: pointer; text-decoration: none; margin-top: 10px;
    }
    .btn:hover { background: #e68a2e; }
    .link { margin-top: 20px; font-size: 13px; color: #666; }
    .link a { color: #1d3557; font-weight: bold; text-decoration: none; }
    .footer { background: #1d3557; padding: 12px; text-align: center; border-top: 4px solid #FF9933; }
    .footer span { color: #FF9933; font-size: 12px; letter-spacing: 1px; }
  </style>
</head>
<body>

<div class="topbar"><a href="index.html">VERILAY</a></div>

<div class="container">
  <div class="card">
    <div class="spinner"></div>
    <h2>Create Account</h2>
    <p>
      We've upgraded signup with <strong>email verification</strong> to keep Verilay authentic and trusted.<br><br>
      Redirecting you to the new signup flow...
    </p>
    <a class="btn" href="login.html">Go to Sign Up →</a>
    <div class="link">Already have an account? <a href="login.html">Login</a></div>
  </div>
</div>

<div class="footer"><span>VERILAY - The layer of truth internet needs</span></div>

<script>
  // Auto-redirect after 2 seconds
  setTimeout(function() {
    window.location.href = "login.html";
  }, 2000);
</script>
</body>
</html>
