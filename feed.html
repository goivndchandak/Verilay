<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feed - Verilay</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* ---------- BASE ---------- */
body {
  margin: 0;
  font-family: Arial;
  background: #fafafa;
  padding-bottom: 70px;
}

/* ---------- TOP BAR ---------- */
.topbar {
  background: #1d3557;
  color: white;
  padding: 15px 20px;
  font-size: 20px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.topbar a {
  color: white;
  border: 1px solid white;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 12px;
  text-decoration: none;
}

/* ---------- CONTAINER ---------- */
.container {
  padding: 12px;
  max-width: 600px;
  margin: auto;
}

/* ---------- CARD ---------- */
.card {
  background: white;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 14px;
}

/* ---------- OWNER NAME ---------- */
.owner {
  font-weight: bold;
  color: #1d3557;
  margin-bottom: 6px;
  font-size: 14px;
}

/* ---------- TEXT ---------- */
.card p {
  font-size: 15px;
  line-height: 1.4;
}

/* ---------- PREVIEW ---------- */
.preview img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
  margin-top: 10px;
}

.preview a {
  display: block;
  font-size: 12px;
  margin-top: 6px;
  color: #1d3557;
  text-decoration: none;
}

/* ---------- BUTTONS ---------- */
.btn {
  padding: 8px 14px;
  border: none;
  border-radius: 20px;
  color: white;
  margin: 5px 5px 0 0;
  cursor: pointer;
  font-size: 12px;
}

.accept { background: #2d6a4f; }
.modify { background: #f77f00; }
.deny   { background: #d62828; }

/* ---------- CARD CTA ---------- */
.gen-card {
  display: inline-block;
  background: #FF9933;
  color: white;
  padding: 7px 14px;
  border-radius: 20px;
  text-decoration: none;
  margin-top: 8px;
  font-size: 12px;
}

/* ---------- BOTTOM NAV ---------- */
.bottomnav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff4e6;
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: 60px;
  border-top: 1px solid #eee;
}

.bottomnav a {
  text-decoration: none;
  text-align: center;
  color: #999;
  font-size: 11px;
}

.bottomnav a.active {
  color: #1d3557;
  font-weight: bold;
}

.bottomnav span {
  font-size: 22px;
  display: block;
}

</style>
</head>

<body>

<!-- ✅ TOP BAR -->
<div class="topbar">
  Verilay
  <a href="explore.html">Explore</a>
</div>

<div class="container" id="feed"></div>

<!-- ✅ BOTTOM NAV -->
<div class="bottomnav">
  <a href="feed.html" class="active"><span>🏠</span>Feed</a>
  <a href="dashboard.html"><span>👤</span>Profile</a>
</div>

<script src="js/api.js"></script>

<script>

/* ---------- GLOBALS ---------- */
const myUserId = localStorage.getItem("user_id");
let myProfile = {};
let userCache = {};

/* ---------- LOAD PROFILE ---------- */
async function loadProfile(){
  try {
    const res = await getProfile();
    myProfile = res.response || {};
  } catch(e){}
}

/* ---------- GET USER NAME ---------- */
async function getUserName(userId){

  if(userCache[userId]) return userCache[userId];

  try {
    const res = await fetch(
      "https://verilay-88625.bubbleapps.io/api/1.1/obj/User/" + userId,
      { headers: authHeaders() }
    );

    const data = await res.json();
    const name = data.response.full_name || "User";

    userCache[userId] = name;
    return name;

  } catch(e){
    return "User";
  }
}

/* ---------- IMAGE PREVIEW ---------- */
function getPreviewHTML(url){

  if(!url) return "";

  if(!url.startsWith("http")){
    url = "https://" + url;
  }

  const img = "https://image.thum.io/get/" + url;

  return `
    <div class="preview">
      <img src="${img}">
      <a href="${url}" target="_blank">Read source ↗</a>
    </div>
  `;
}

/* ---------- LOAD FEED ---------- */
async function loadFeed(){

  const res = await getFeed();
  const list = res.response.statements || res.response.results || [];

  let html = "";

  for (let item of list) {

    const id = item._id || item.id;
    const text = item.text || "";
    const url = item.source_url || "";

    const ownerId =
      item["Created By"] ||
      item.created_by ||
      item.user_id ||
      item.creator;

    const isOwner = (ownerId == myUserId);

    const ownerName = await getUserName(ownerId);

    html += `<div class="card">`;

    html += `<div class="owner">${ownerName}</div>`;

    html += `<p>${text}</p>`;

    if(url){
      html += getPreviewHTML(url);
    }

    if(isOwner){
      html += `
        <div id="action-${id}">
          <button class="btn accept" onclick="react('${id}','accepted',\`${text}\`)">Accept</button>
          <button class="btn modify" onclick="react('${id}','modified',\`${text}\`)">Modify</button>
          <button class="btn deny" onclick="react('${id}','denied',\`${text}\`)">Deny</button>
        </div>

        <div id="result-${id}"></div>
      `;
    }

    html += `</div>`;
  }

  document.getElementById("feed").innerHTML = html;
}

/* ---------- REACT ---------- */
async function react(id, action, text){

  await reactStatement(id, action);

  document.getElementById("action-"+id).style.display = "none";

  document.getElementById("result-"+id).innerHTML = `
    Marked ${action}
    <br>
    <a class="gen-card"
       href="card.html?name=${encodeURIComponent(myProfile.full_name)}
       &username=${encodeURIComponent(myProfile.username)}
       &text=${encodeURIComponent(text)}
       &verdict=${action}">
       Generate Card
    </a>
  `;
}

/* ---------- INIT ---------- */
loadProfile();
loadFeed();

</script>

</body>
</html>
