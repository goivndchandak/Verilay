<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Verilay – Feed</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#1a1a2e;padding-bottom:70px}
    .header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
    .logo{color:#e8a838;font-size:22px;font-weight:800;letter-spacing:4px}
    .explore-btn{background:#e8a838;color:#fff;border:none;padding:8px 18px;border-radius:20px;font-weight:700;cursor:pointer}
    .loading{text-align:center;padding:28px;color:#888}
    .empty{text-align:center;padding:40px 20px;color:#aaa}
    .error-msg{color:#c62828;text-align:center;padding:20px}

    .feed-card{background:#fff;border-radius:12px;padding:16px;margin:12px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .feed-user{font-size:14px;font-weight:800;margin-bottom:8px}
    .feed-stmt{font-size:15px;line-height:1.5;margin-bottom:10px}
    .prefix{color:#e8a838;font-weight:900}
    .source{display:inline-block;margin-top:8px;color:#e8a838;text-decoration:none;font-weight:700;font-size:13px}

    .reactions{display:flex;gap:10px;margin-top:12px}
    .react-btn{border:none;padding:9px 14px;border-radius:20px;color:#fff;font-weight:800;cursor:pointer;font-size:13px}
    .react-btn.accept{background:#2e7d32}
    .react-btn.modify{background:#e8a838}
    .react-btn.deny{background:#c62828}
    .reacted-label{margin-top:8px;color:#888;font-style:italic;font-size:13px}

    /* Link preview */
    .lp{border:1px solid #eee;border-radius:10px;overflow:hidden;margin:10px 0;cursor:pointer}
    .lp img{width:100%;height:180px;object-fit:cover;display:block}
    .lp-body{padding:10px 12px}
