<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feed - Verilay</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: #f5f5f5;
  padding-bottom: 70px;
  color: #1a1a1a;
}

.topbar {
  background: #1d3557; color: white;
  padding: 15px 20px; font-size: 20px; font-weight: bold;
  display: flex; justify-content: space-between; align-items: center;
}
.topbar a {
  color: white; border: 1px solid rgba(255,255,255,0.4);
  padding: 6px 14px; border-radius: 6px;
  font-size: 12px; text-decoration: none;
}

.container { padding: 10px 14px; max-width: 600px; margin: auto; }

.card {
  background: white; padding: 16px; margin-bottom: 10px;
  border-radius: 12px; border: 1px solid rgba(0,0,0,0.06);
}

.header-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}
.avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: #e8ecf0; color: #1d3557; font-size: 15px; font-weight: bold;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.header-text { flex: 1; }
.name { font-weight: 700; color: #1d3557; font-size: 14px; }

.owner-reaction { font-size: 12px; font-weight: 600; margin-top: 2px; }
.r-accepted { color: #3a7d5c; }
.r-modified { color: #c47a1a; }
.r-denied { color: #b84040; }
.r-pending { color: #bbb; }

.stmt { font-size: 15px; line-height: 1.5; color: #2a2a2a; margin-bottom: 10px; }

.link-preview {
  border: 1px solid #eee; border-radius: 10px;
  overflow: hidden; margin-bottom: 8px;
}
.link-preview img { width: 100%; height: 180px; object-fit: cover; display: block; }
.link-preview .source {
  padding: 10px 12px; font-size: 12px; color: #1d3557;
  text-decoration: none; display: block; background: #fafafa;
}

.date { font-size: 11px; color: #bbb; }

/* ✅ VOUCH + COUNTER BUTTONS */
.community-row {
  display: flex; align-items: center; gap: 8px;
  margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f0;
}

.react-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 16px; border-radius: 8px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1px solid #e0e0e0; background: white; color: #555;
  transition: all 0.2s ease;
}
.react-btn:hover { background: #f8f8f8; }

.react-btn.active-vouch {
  background: #eaf5ee;
  border-color: #3a7d5c;
  color: #3a7d5c;
}

.react-btn.active-counter {
  background: #fff5e6;
  border-color: #c47a1a;
  color: #c47a1a;
}

.react-count {
  font-size: 11px; color: #bbb; margin-left: 2px;
}

.muted { color: #999; font-size: 14px; text-align: center; padding: 40px 20px; }

.bottomnav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff4e6; display: flex; justify-content: space-around;
  align-items: center; height: 60px; border-top: 1px solid #eee;
}
.bottomnav a { text-decoration: none; text-align: center; color: #999; font-size: 11px; }
.bottomnav a.active { color: #1d3557; font-weight: bold; }
.bottomnav a span { font-size: 22px; display: block; }
</style>
</head>

<body>

<div class="topbar">
  Verilay
  <a href="explore.html">Explore</a>
</div>

<div class="container" id="feed"><div class="muted">Loading feed...</div></div>

<div class="bottomnav">
  <a href="feed.html" class="active"><span>🏠</span>Feed</a>
  <a href="dashboard.html"><span>👤</span>Profile</a>
</div>

<script src="js/api.js"></script>
<script>

let userCache = {};

// Owner reactions (from profile tab)
function getStoredReactions() {
  try { return JSON.parse(localStorage.getItem("verilay_stmt_reactions") || "{}"); } catch(e) { return {}; }
}
function getStoredReaction(stmtId) {
  return getStoredReactions()[stmtId] || "";
}

// Community reactions (Vouch / Counter)
function getCommunity() {
  try { return JSON.parse(localStorage.getItem("verilay_community") || "{}"); } catch(e) { return {}; }
}
function saveCommunity(obj) {
  localStorage.setItem("verilay_community", JSON.stringify(obj));
}

// Counts
function getCounts() {
  try { return JSON.parse(localStorage.getItem("verilay_counts") || "{}"); } catch(e) { return {}; }
}
function saveCounts(obj) {
  localStorage.setItem("verilay_counts", JSON.stringify(obj));
}

function escapeHtml(str) {
  return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function timeAgo(dateStr) {
  if (!dateStr) return "";
  try {
    var diff = Date.now() - new Date(dateStr).getTime();
    var mins = Math.floor(diff / 60000);
    if (mins < 1) return "Just now";
    if (mins < 60) return mins + "m ago";
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + "h ago";
    var days = Math.floor(hrs / 24);
    if (days < 7) return days + "d ago";
    return new Date(dateStr).toLocaleDateString();
  } catch(e) { return ""; }
}

async function getUserInfo(userId){
  if (!userId) return { name: "User", photo: "" };
  if (userCache[userId]) return userCache[userId];
  try {
    var res = await fetch(DATA_BASE + "/User/" + userId, { method: "GET", headers: authHeaders() });
    var data = await res.json();
    var user = data.response || {};
    userCache[userId] = { name: user.full_name || "User", photo: user.profile_picture_url || "" };
    return userCache[userId];
  } catch(e){ return { name: "User", photo: "" }; }
}

function getPreviewHTML(url){
  if (!url) return "";
  if (!/^https?:\/\//i.test(url)) url = "https://" + url;
  return "<div class='link-preview'>"
    + "<img src='https://image.thum.io/get/" + escapeHtml(url) + "'>"
    + "<a class='source' href='" + escapeHtml(url) + "' target='_blank'>View source ↗</a>"
    + "</div>";
}

function getReaction(item) {
  var r = (item.reaction_type || item.reaction || item.verdict || "").toLowerCase();
  if (r === "accepted" || r === "accept") return "accepted";
  if (r === "modified" || r === "modify") return "modified";
  if (r === "denied" || r === "deny") return "denied";
  var id = item._id || item.id || "";
  if (id) { var stored = getStoredReaction(id); if (stored) return stored; }
  var t = (item.text || "").trim().toUpperCase();
  if (t.startsWith("ACCEPTED:")) return "accepted";
  if (t.startsWith("MODIFIED:")) return "modified";
  if (t.startsWith("DENIED:")) return "denied";
  return "";
}

function cleanText(text) {
  return (text || "").replace(/^(ACCEPTED|MODIFIED|DENIED|ACCEPT|MODIFY|DENY):\s*/i, "").trim();
}

function getOwnerReactionLabel(reaction) {
  if (reaction === "accepted") return "<div class='owner-reaction r-accepted'>Accepted ✓</div>";
  if (reaction === "modified") return "<div class='owner-reaction r-modified'>Modified ✎</div>";
  if (reaction === "denied") return "<div class='owner-reaction r-denied'>Denied ✗</div>";
  return "<div class='owner-reaction r-pending'>Awaiting response</div>";
}

// ✅ TOGGLE VOUCH / COUNTER
function toggleCommunity(stmtId, type) {
  var community = getCommunity();
  var counts = getCounts();

  if (!counts[stmtId]) counts[stmtId] = { vouch: 0, counter: 0 };

  var prev = community[stmtId] || "";

  // Remove previous
  if (prev === "vouch") counts[stmtId].vouch = Math.max(0, counts[stmtId].vouch - 1);
  if (prev === "counter") counts[stmtId].counter = Math.max(0, counts[stmtId].counter - 1);

  // Toggle
  if (prev === type) {
    community[stmtId] = "";
  } else {
    community[stmtId] = type;
    if (type === "vouch") counts[stmtId].vouch++;
    if (type === "counter") counts[stmtId].counter++;
  }

  saveCommunity(community);
  saveCounts(counts);
  updateButtons(stmtId);
}

function updateButtons(stmtId) {
  var community = getCommunity();
  var counts = getCounts();
  var current = community[stmtId] || "";
  var c = counts[stmtId] || { vouch: 0, counter: 0 };

  var vouchBtn = document.getElementById("vouch-" + stmtId);
  var counterBtn = document.getElementById("counter-" + stmtId);

  if (vouchBtn) {
    vouchBtn.className = "react-btn" + (current === "vouch" ? " active-vouch" : "");
    vouchBtn.innerHTML = "🤝 Vouch" + (c.vouch > 0 ? " <span class='react-count'>" + c.vouch + "</span>" : "");
  }

  if (counterBtn) {
    counterBtn.className = "react-btn" + (current === "counter" ? " active-counter" : "");
    counterBtn.innerHTML = "✋ Counter" + (c.counter > 0 ? " <span class='react-count'>" + c.counter + "</span>" : "");
  }
}

async function loadFeed(){
  try {
    var res = await getFeed();
    var list = res.response.statements || res.response.results || [];

    if (list.length === 0) {
      document.getElementById("feed").innerHTML = "<div class='muted'>No posts yet.</div>";
      return;
    }

    var community = getCommunity();
    var counts = getCounts();
    var html = "";

    for (var i = 0; i < list.length; i++) {
      var item = list[i];
      var rawText = item.text || "";
      var url = item.source_url || "";
      var created = item.Created_Date || item.created_date || "";
      var stmtId = item._id || item.id || "";

      var reaction = getReaction(item);
      var text = cleanText(rawText);

      var ownerId = item["Created By"] || item.created_by || item.user_id || item.creator;
      var ownerInfo = await getUserInfo(ownerId);

      var avatarHtml = "";
      if (ownerInfo.photo) {
        avatarHtml = "<div class='avatar'><img src='" + escapeHtml(ownerInfo.photo) + "'></div>";
      } else {
        avatarHtml = "<div class='avatar'>" + escapeHtml((ownerInfo.name || "?").charAt(0)) + "</div>";
      }

      var myReaction = community[stmtId] || "";
      var c = counts[stmtId] || { vouch: 0, counter: 0 };

      html += "<div class='card'>";

      // HEADER
      html += "<div class='header-row'>";
      html += avatarHtml;
      html += "<div class='header-text'>";
      html += "<div class='name'>" + escapeHtml(ownerInfo.name) + "</div>";
      html += getOwnerReactionLabel(reaction);
      html += "</div></div>";

      // TEXT
      html += "<div class='stmt'>" + escapeHtml(text) + "</div>";

      // PREVIEW
      if (url) html += getPreviewHTML(url);

      // DATE
      if (created) html += "<div class='date'>" + timeAgo(created) + "</div>";

      // ✅ VOUCH + COUNTER
      html += "<div class='community-row'>";

      html += "<button class='react-btn" + (myReaction === "vouch" ? " active-vouch" : "") + "'"
        + " id='vouch-" + stmtId + "'"
        + " onclick=\"toggleCommunity('" + stmtId + "','vouch')\">"
        + "🤝 Vouch"
        + (c.vouch > 0 ? " <span class='react-count'>" + c.vouch + "</span>" : "")
        + "</button>";

      html += "<button class='react-btn" + (myReaction === "counter" ? " active-counter" : "") + "'"
        + " id='counter-" + stmtId + "'"
        + " onclick=\"toggleCommunity('" + stmtId + "','counter')\">"
        + "✋ Counter"
        + (c.counter > 0 ? " <span class='react-count'>" + c.counter + "</span>" : "")
        + "</button>";

      html += "</div>";

      html += "</div>";
    }

    document.getElementById("feed").innerHTML = html;

  } catch(err) {
    document.getElementById("feed").innerHTML = "<div class='muted'>Error: " + escapeHtml(err.message) + "</div>";
  }
}

loadFeed();

</script>
</body>
</html>
