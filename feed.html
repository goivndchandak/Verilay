<!DOCTYPE html>
<html>
<head>
  <title>Verilay</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #F8FAFC;
    }

    .header {
      background: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
    }

    .feed {
      padding: 10px;
      max-width: 500px;
      margin: auto;
    }

    .post {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .actions button {
      margin-right: 10px;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .accept { background: #DCFCE7; }
    .modify { background: #FEF3C7; }
    .deny { background: #FEE2E2; }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px;
      border-top: 1px solid #ddd;
    }
  </style>
</head>

<body>

<div class="header">VERILAY</div>

<div class="feed">

  <div class="post">
    <b>@username</b>
    <p>"Partnership confirmed with XYZ"</p>

    <div class="actions">
      <button class="accept">✅</button>
      <button class="modify">✏️</button>
      <button class="deny">❌</button>
    </div>
  </div>

  <div class="post">
    <b>@founder</b>
    <p>"Funding secured"</p>

    <div class="actions">
      <button class="accept">✅</button>
      <button class="modify">✏️</button>
      <button class="deny">❌</button>
    </div>
  </div>

</div>

<div class="nav">
  <div onclick="window.location='feed.html'">🏠</div>
  <div onclick="window.location='dashboard.html'">➕</div>
  <div onclick="window.location='dashboard.html'">👤</div>
</div>

</body>
</html>
