<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feed - Verilay</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: #f5f5f5;
  padding-bottom: 70px;
  color: #1a1a1a;
}

.topbar {
  background: #1d3557; color: white;
  padding: 15px 20px; font-size: 20px; font-weight: bold;
  display: flex; justify-content: space-between; align-items: center;
}
.topbar a {
  color: white; border: 1px solid rgba(255,255,255,0.4);
  padding: 6px 14px; border-radius: 6px;
  font-size: 12px; text-decoration: none;
}

.container { padding: 10px 14px; max-width: 600px; margin: auto; }

/* ✅ CARD — CLEAN, MINIMAL */
.card {
  background: white;
  padding: 16px;
  margin-bottom: 10px;
  border-radius: 12px;
  border: 1px solid rgba(0,0,0,0.06);
}

/* ✅ HEADER ROW */
.header-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: #e8ecf0; color: #1d3557; font-size: 15px; font-weight: bold;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }

.header-text { flex: 1; }

.name {
  font-weight: 700; color: #1d3557; font-size: 14px;
  line-height: 1.2;
}

/* ✅ REACTION — SUBTLE ELEGANT TEXT */
.reaction {
  font-size: 12px;
  font-weight: 600;
  margin-top: 2px;
}
.reaction-accepted { color: #3a7d5c; }
.reaction-modified { color: #c47a1a; }
.reaction-denied { color: #b84040; }
.reaction-pending { color: #aaa; }

/* ✅ STATEMENT TEXT */
.stmt {
  font-size: 15px;
  line-height: 1.5;
  color: #2a2a2a;
  margin-bottom: 10px;
}

/* ✅ PREVIEW — CLEAN CARD */
.link-preview {
  border: 1px solid #eee;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 8px;
}
.link-preview img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
}
.link-preview .source {
  padding: 10px 12px;
  font-size: 12px;
  color: #1d3557;
  text-decoration: none;
  display: block;
  background: #fafafa;
}

/* ✅ DATE */
.date {
  font-size: 11px;
  color: #bbb;
  margin-top: 4px;
}

/* ✅ DIVIDER LINE */
.divider {
  height: 1px;
  background: #f0f0f0;
  margin: 6px 0;
}

.muted { color: #999; font-size: 14px; text-align: center; padding: 40px 20px; }

/* ✅ BOTTOM NAV */
.bottomnav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff4e6;
  display: flex; justify-content: space-around;
  align-items: center; height: 60px;
  border-top: 1px solid #eee;
}
.bottomnav a {
  text-decoration: none; text-align: center;
  color: #999; font-size: 11px;
}
.bottomnav a.active { color: #1d3557; font-weight: bold; }
.bottomnav a span { font-size: 22px; display: block; }
</style>
</head>

<body>

<div class="topbar">
  Verilay
  <a href="explore.html">Explore</a>
</div>

<div class="container" id="feed"><div class="muted">Loading feed...</div></div>

<div class="bottomnav">
  <a href="feed.html" class="active"><span>🏠</span>Feed</a>
  <a href="dashboard.html"><span>👤</span>Profile</a>
</div>

<script src="js/api.js"></script>
<script>

let userCache = {};

function escapeHtml(str) {
  return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

async function getUserInfo(userId){
  if (!userId) return { name: "User", photo: "" };
  if (userCache[userId]) return userCache[userId];
  try {
    const res = await fetch(
      DATA_BASE + "/User/" + userId,
      { method: "GET", headers: authHeaders() }
    );
    const data = await res.json();
    const user = data.response || {};
    userCache[userId] = {
      name: user.full_name || "User",
      photo: user.profile_picture_url || ""
    };
    return userCache[userId];
  } catch(e){
    return { name: "User", photo: "" };
  }
}

function getPreviewHTML(url){
  if (!url) return "";
  if (!/^https?:\/\//i.test(url)) url = "https://" + url;
  return "<div class='link-preview'>"
    + "<img src='https://image.thum.io/get/" + escapeHtml(url) + "'>"
    + "<a class='source' href='" + escapeHtml(url) + "' target='_blank'>View source ↗</a>"
    + "</div>";
}

function getReaction(item) {
  var r = (item.reaction_type || item.reaction || item.verdict || item.status || "").toLowerCase();
  if (r === "accepted" || r === "accept") return "accepted";
  if (r === "modified" || r === "modify") return "modified";
  if (r === "denied" || r === "deny") return "denied";
  return "";
}

function getReactionFromText(text) {
  var t = (text || "").trim().toUpperCase();
  if (t.startsWith("ACCEPTED:")) return "accepted";
  if (t.startsWith("MODIFIED:")) return "modified";
  if (t.startsWith("DENIED:")) return "denied";
  if (t.startsWith("ACCEPT:")) return "accepted";
  if (t.startsWith("MODIFY:")) return "modified";
  if (t.startsWith("DENY:")) return "denied";
  return "";
}

function cleanText(text) {
  return (text || "")
    .replace(/^(ACCEPTED|MODIFIED|DENIED|ACCEPT|MODIFY|DENY):\s*/i, "")
    .trim();
}

function getReactionLabel(reaction) {
  if (reaction === "accepted") return "<div class='reaction reaction-accepted'>Accepted ✓</div>";
  if (reaction === "modified") return "<div class='reaction reaction-modified'>Modified ✎</div>";
  if (reaction === "denied") return "<div class='reaction reaction-denied'>Denied ✗</div>";
  return "<div class='reaction reaction-pending'>Awaiting response</div>";
}

async function loadFeed(){
  try {
    const res = await getFeed();
    const list = res.response.statements || res.response.results || [];

    if (list.length === 0) {
      document.getElementById("feed").innerHTML =
        "<div class='muted'>No posts yet.</div>";
      return;
    }

    let html = "";

    for (let item of list) {
      const rawText = item.text || "";
      const url = item.source_url || "";
      const created = item.Created_Date || item.created_date || "";

      let reaction = getReaction(item);
      if (!reaction) reaction = getReactionFromText(rawText);

      const text = cleanText(rawText);

      const ownerId = item["Created By"] || item.created_by || item.user_id || item.creator;
      const ownerInfo = await getUserInfo(ownerId);

      // AVATAR
      let avatarHtml = "";
      if (ownerInfo.photo) {
        avatarHtml = "<div class='avatar'><img src='" + escapeHtml(ownerInfo.photo) + "'></div>";
      } else {
        avatarHtml = "<div class='avatar'>" + escapeHtml((ownerInfo.name || "?").charAt(0)) + "</div>";
      }

      html += "<div class='card'>";

      // ✅ HEADER: AVATAR + NAME + REACTION (subtle text below name)
      html += "<div class='header-row'>";
      html += avatarHtml;
      html += "<div class='header-text'>";
      html += "<div class='name'>" + escapeHtml(ownerInfo.name) + "</div>";
      html += getReactionLabel(reaction);
      html += "</div>";
      html += "</div>";

      // TEXT
      html += "<div class='stmt'>" + escapeHtml(text) + "</div>";

      // PREVIEW
      if (url) html += getPreviewHTML(url);

      // DATE
      if (created) {
        try {
          html += "<div class='date'>" + new Date(created).toLocaleDateString() + "</div>";
        } catch(e){}
      }

      html += "</div>";
    }

    document.getElementById("feed").innerHTML = html;

  } catch(err) {
    document.getElementById("feed").innerHTML =
      "<div class='muted'>Error: " + escapeHtml(err.message) + "</div>";
  }
}

loadFeed();

</script>
</body>
</html>
