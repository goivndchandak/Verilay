<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feed - Verilay</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: #f5f5f5;
  padding-bottom: 85px;
  color: #1a1a1a;
}

/* ============================================================
   ✅ TOP BAR — LOGO LEFT + SEARCH CENTER + NOTIF RIGHT
   ============================================================ */
.topbar {
  background: #1d3557; color: white;
  padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 100;
}
<!-- ✅ TOP BAR — LOGO LEFT (bigger) + SEARCH CENTER (shorter) + NOTIF RIGHT -->
<div class="topbar">
  <img src="logo-white.png" alt="Verilay" class="topbar-logo" onerror="this.outerHTML='<span style=\'font-size:18px;font-weight:800;\'><span style=color:#FF9933>✓</span><span style=color:white>erilay</span></span>'">
  <div class="search-bar" onclick="window.location.href='explore.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
    <span>Search...</span>
  </div>
  <button class="notif-btn" onclick="toggleNotif()">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
    <span class="notif-dot"></span>
  </button>
</div>
.notif-btn {
  background: none; border: none; cursor: pointer;
  padding: 6px; border-radius: 8px; position: relative;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.notif-btn:hover { background: rgba(255,255,255,0.1); }
.notif-btn svg { width: 22px; height: 22px; }
.notif-dot {
  position: absolute; top: 4px; right: 4px;
  width: 7px; height: 7px; background: #FF9933;
  border-radius: 50%; border: 1.5px solid #1d3557;
}

.container { padding: 10px 14px; max-width: 600px; margin: auto; }

/* ============================================================
   ✅ FEED CARD
   ============================================================ */
.card {
  background: white; padding: 16px;
  margin-bottom: 10px; border-radius: 14px;
  border: 1px solid #e8ecf0;
}
.header-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: #fff5e6; color: #e68a2e; font-size: 16px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0; border: 2px solid #ffe0b2;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.header-text { flex: 1; }
.name { font-weight: 700; color: #1a1a1a; font-size: 15px; }
.owner-reaction { display: inline-flex; align-items: center; gap: 3px; font-size: 12px; font-weight: 600; margin-top: 2px; }
.r-accepted { color: #3a7d5c; }
.r-modified { color: #c47a1a; }
.r-denied { color: #b84040; }
.r-pending { color: #bbb; }
.r-accepted::before { content: "✓ "; }
.r-modified::before { content: "✎ "; }
.r-denied::before { content: "✗ "; }
.header-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.time-stamp { font-size: 12px; color: #b0b8c4; font-weight: 500; }

/* MENU */
.menu-wrap { position: relative; }
.menu-btn { background: none; border: none; cursor: pointer; color: #b0b8c4; font-size: 18px; padding: 4px 6px; line-height: 1; border-radius: 6px; }
.menu-btn:hover { background: #f0f2f5; color: #6b7a8d; }
.menu-dropdown { display: none; position: absolute; top: 28px; right: 0; z-index: 50; background: white; border: 1px solid #e8ecf0; border-radius: 10px; overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.1); min-width: 150px; }
.menu-dropdown.open { display: block; }
.menu-option { display: flex; align-items: center; gap: 8px; padding: 10px 14px; font-size: 13px; font-weight: 500; color: #1a1a1a; cursor: pointer; border: none; background: none; width: 100%; text-align: left; }
.menu-option:hover { background: #f5f7fa; }
.menu-option svg { width: 16px; height: 16px; color: #9aa5b4; }
.menu-divider { height: 1px; background: #f0f2f5; }

.stmt { font-size: 15px; line-height: 1.65; color: #2a2a2a; margin-bottom: 12px; }

/* LINK PREVIEW */
.link-preview { border: 1px solid #e8ecf0; border-radius: 12px; overflow: hidden; margin-bottom: 12px; display: flex; align-items: stretch; background: #fafbfc; text-decoration: none; }
.link-preview .lp-image { width: 80px; min-height: 70px; flex-shrink: 0; background: #e8ecf0; overflow: hidden; }
.link-preview .lp-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
.link-preview .lp-body { padding: 10px 12px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
.link-preview .lp-title { font-size: 13px; font-weight: 600; color: #1a1a1a; line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.link-preview .lp-source { font-size: 11px; color: #9aa5b4; }
.card-date { font-size: 12px; color: #b0b8c4; margin-bottom: 10px; font-weight: 500; }

/* ============================================================
   ✅ VOUCH & COUNTER — MINIMAL WHITE + BLACK BORDER
   ============================================================ */
.community-row {
  display: flex; align-items: center;
  gap: 8px; padding-top: 10px;
  border-top: 1px solid #f0f2f5;
}

.react-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 10px; border-radius: 16px;
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  border: 1.5px solid #d0d4da;
  background: white; color: #6b7a8d;
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  position: relative; top: 0;
  user-select: none;
}
.react-btn:hover { background: #f8f9fb; border-color: #b0b8c4; color: #4a5568; }
.react-btn .react-icon-svg { width: 14px; height: 14px; transition: all 0.3s ease; }
.react-btn .react-text { font-size: 11px; font-weight: 600; }
.react-btn .react-count { font-size: 11px; font-weight: 700; margin-left: 1px; }

/* VOUCH ACTIVE */
.react-btn.active-vouch {
  background: white; border: 1.5px solid #2d6a4f; color: #2d6a4f;
  top: -5px; box-shadow: 0 3px 10px rgba(45,106,79,0.1); transform: scale(1.03);
}
.react-btn.active-vouch .react-icon-svg { color: #2d6a4f; }

/* COUNTER ACTIVE */
.react-btn.active-counter {
  background: white; border: 1.5px solid #555; color: #333;
  top: -5px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); transform: scale(1.03);
}
.react-btn.active-counter .react-icon-svg { color: #333; }

/* ============================================================
   ✅ BOTTOM NAV
   ============================================================ */
.bottomnav { position: fixed; bottom: 0; left: 0; right: 0; height: 72px; z-index: 100; display: flex; justify-content: center; align-items: flex-end; pointer-events: none; }
.nav-bar { width: 100%; max-width: 420px; background: #edf1f7; border-radius: 22px 22px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.06); display: flex; justify-content: space-around; align-items: center; height: 58px; padding: 0 40px; pointer-events: all; }
.nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #9aa5b4; font-size: 10px; font-weight: 600; letter-spacing: 0.3px; gap: 2px; transition: all 0.3s ease; position: relative; padding: 6px 20px; }
.nav-item .nav-icon { width: 20px; height: 20px; }
.nav-item .nav-label { font-size: 10px; }
.nav-item.active { color: #1d3557; top: -18px; }
.nav-item.active .icon-circle { background: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(29,53,87,0.15); border: 2px solid #dce3ed; }
.nav-item.active .nav-icon { width: 22px; height: 22px; }
.nav-item.active .nav-label { margin-top: 4px; color: #1d3557; font-weight: 700; }
.nav-item:not(.active) .icon-circle { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }

.muted { color: #999; font-size: 14px; text-align: center; padding: 40px 20px; }

/* NOTIF PANEL */
.notif-panel { display: none; position: fixed; top: 50px; left: 10px; right: 10px; max-width: 400px; background: white; border-radius: 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); z-index: 200; padding: 16px; max-height: 60vh; overflow-y: auto; }
.notif-panel.open { display: block; }
.notif-panel h3 { font-size: 15px; color: #1d3557; margin-bottom: 12px; }
.notif-item { padding: 10px 0; border-bottom: 1px solid #f0f2f5; font-size: 13px; color: #555; line-height: 1.4; }
.notif-item:last-child { border-bottom: none; }
.notif-time { font-size: 11px; color: #b0b8c4; margin-top: 4px; }
</style>
</head>

<body>

<!-- ✅ TOP BAR -->
<div class="topbar">
  <img src="logo.png" alt="Verilay" class="topbar-logo">
  <div class="search-bar" onclick="window.location.href='explore.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
    <span>Search Verilay...</span>
  </div>
  <button class="notif-btn" onclick="toggleNotif()">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
    <span class="notif-dot"></span>
  </button>
</div>

<!-- NOTIF PANEL -->
<div class="notif-panel" id="notifPanel">
  <h3>🔔 Notifications</h3>
  <div id="notifList">
    <div class="notif-item"><strong>Welcome to Verilay!</strong> Start by posting your first truth statement.<div class="notif-time">Just now</div></div>
    <div class="notif-item">Your profile is set up. Link your social accounts for verified status.<div class="notif-time">1m ago</div></div>
  </div>
</div>

<div class="container" id="feed"><div class="muted">Loading feed...</div></div>

<!-- ✅ BOTTOM NAV — FEED ACTIVE -->
<div class="bottomnav">
  <div class="nav-bar">
    <a href="feed.html" class="nav-item active">
      <div class="icon-circle"><svg class="nav-icon" viewBox="0 0 24 24" fill="#1d3557" stroke="none"><path d="M12 3L4 9v11a1 1 0 001 1h4v-6h6v6h4a1 1 0 001-1V9l-8-6z"/></svg></div>
      <span class="nav-label">Feed</span>
    </a>
    <a href="dashboard.html" class="nav-item">
      <div class="icon-circle"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="#9aa5b4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/></svg></div>
      <span class="nav-label">Profile</span>
    </a>
  </div>
</div>

<script src="js/api.js"></script>
<script>

let userCache = {};

// ✅ HAND SVG ICONS — WHITE BASE, STROKE ONLY, NO YELLOW
var VOUCH_ICON = "<svg class='react-icon-svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M11 17a4 4 0 008 0v-4'/><path d='M7 13a4 4 0 00-4 4v0'/><path d='M11 13V7a2 2 0 00-4 0v6'/><path d='M15 13V5a2 2 0 014 0v8'/></svg>";

var COUNTER_ICON = "<svg class='react-icon-svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M18 11V6a2 2 0 00-4 0'/><path d='M14 6V4a2 2 0 00-4 0v2'/><path d='M10 6V5a2 2 0 00-4 0v5'/><path d='M6 10a2 2 0 00-2 2v1a8 8 0 0016 0v-1a2 2 0 00-2-2'/></svg>";

function getStoredReactions() { try { return JSON.parse(localStorage.getItem("verilay_stmt_reactions") || "{}"); } catch(e) { return {}; } }
function getStoredReaction(stmtId) { return getStoredReactions()[stmtId] || ""; }
function getCommunity() { try { return JSON.parse(localStorage.getItem("verilay_community") || "{}"); } catch(e) { return {}; } }
function saveCommunity(obj) { localStorage.setItem("verilay_community", JSON.stringify(obj)); }
function getCounts() { try { return JSON.parse(localStorage.getItem("verilay_counts") || "{}"); } catch(e) { return {}; } }
function saveCounts(obj) { localStorage.setItem("verilay_counts", JSON.stringify(obj)); }
function escapeHtml(str) { return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function timeAgo(dateStr) {
  if (!dateStr) return "";
  try {
    var diff = Date.now() - new Date(dateStr).getTime();
    var mins = Math.floor(diff / 60000);
    if (mins < 1) return "Just now";
    if (mins < 60) return mins + "m ago";
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + "h ago";
    var days = Math.floor(hrs / 24);
    if (days < 7) return days + "d ago";
    return new Date(dateStr).toLocaleDateString();
  } catch(e) { return ""; }
}

async function getUserInfo(userId){
  if (!userId) return { name: "User", photo: "" };
  if (userCache[userId]) return userCache[userId];
  try {
    var res = await fetch(DATA_BASE + "/User/" + userId, { method: "GET", headers: authHeaders() });
    var data = await res.json(); var user = data.response || {};
    userCache[userId] = { name: user.full_name || "User", photo: user.profile_picture_url || "" };
    return userCache[userId];
  } catch(e){ return { name: "User", photo: "" }; }
}

function getPreviewHTML(url, title){
  if (!url) return "";
  if (!/^https?:\/\//i.test(url)) url = "https://" + url;
  var domain = ""; try { domain = new URL(url).hostname.replace("www.",""); } catch(e) { domain = url; }
  var pt = title || "News Article"; if (pt.length > 60) pt = pt.substring(0,60) + "...";
  return "<a href='" + escapeHtml(url) + "' target='_blank' style='text-decoration:none;'><div class='link-preview'><div class='lp-image'><img src='https://image.thum.io/get/width/160/" + escapeHtml(url) + "'></div><div class='lp-body'><div class='lp-title'>" + escapeHtml(pt) + "</div><div class='lp-source'>" + escapeHtml(domain) + "</div></div></div></a>";
}

function getReaction(item) {
  var r = (item.reaction_type || item.reaction || item.verdict || "").toLowerCase();
  if (r === "accepted" || r === "accept") return "accepted";
  if (r === "modified" || r === "modify") return "modified";
  if (r === "denied" || r === "deny") return "denied";
  var id = item._id || item.id || "";
  if (id) { var stored = getStoredReaction(id); if (stored) return stored; }
  var t = (item.text || "").trim().toUpperCase();
  if (t.startsWith("ACCEPTED:")) return "accepted";
  if (t.startsWith("MODIFIED:")) return "modified";
  if (t.startsWith("DENIED:")) return "denied";
  return "";
}

function cleanText(text) { return (text || "").replace(/^(ACCEPTED|MODIFIED|DENIED|ACCEPT|MODIFY|DENY):\s*/i, "").trim(); }

function getOwnerReactionLabel(reaction) {
  if (reaction === "accepted") return "<div class='owner-reaction r-accepted'>Accepted</div>";
  if (reaction === "modified") return "<div class='owner-reaction r-modified'>Modified</div>";
  if (reaction === "denied") return "<div class='owner-reaction r-denied'>Denied</div>";
  return "<div class='owner-reaction r-pending'>Awaiting response</div>";
}

// NOTIF
function toggleNotif() { document.getElementById("notifPanel").classList.toggle("open"); }
document.addEventListener("click", function(e) {
  if (!e.target.closest('.notif-btn') && !e.target.closest('.notif-panel')) document.getElementById("notifPanel").classList.remove("open");
  if (!e.target.closest('.menu-wrap')) document.querySelectorAll('.menu-dropdown.open').forEach(function(m) { m.classList.remove('open'); });
});

// MENU
function toggleMenu(stmtId) {
  document.querySelectorAll('.menu-dropdown.open').forEach(function(m) { if (m.id !== 'menu-' + stmtId) m.classList.remove('open'); });
  var menu = document.getElementById('menu-' + stmtId); if (menu) menu.classList.toggle('open');
}
function viewProfile(userId) { document.querySelectorAll('.menu-dropdown.open').forEach(function(m) { m.classList.remove('open'); }); alert("Profile view coming soon!"); }
function followUser(userId, name) {
  document.querySelectorAll('.menu-dropdown.open').forEach(function(m) { m.classList.remove('open'); });
  var follows = {}; try { follows = JSON.parse(localStorage.getItem("verilay_follows") || "{}"); } catch(e) {}
  if (follows[userId]) { delete follows[userId]; alert("Unfollowed " + name); } else { follows[userId] = true; alert("Following " + name + " ✓"); }
  localStorage.setItem("verilay_follows", JSON.stringify(follows));
}
function isFollowing(userId) { try { return !!JSON.parse(localStorage.getItem("verilay_follows") || "{}")[userId]; } catch(e) { return false; } }

// VOUCH / COUNTER
function toggleCommunity(stmtId, type) {
  var community = getCommunity(); var counts = getCounts();
  if (!counts[stmtId]) counts[stmtId] = { vouch: 0, counter: 0 };
  var prev = community[stmtId] || "";
  if (prev === "vouch") counts[stmtId].vouch = Math.max(0, counts[stmtId].vouch - 1);
  if (prev === "counter") counts[stmtId].counter = Math.max(0, counts[stmtId].counter - 1);
  if (prev === type) { community[stmtId] = ""; }
  else { community[stmtId] = type; if (type === "vouch") counts[stmtId].vouch++; if (type === "counter") counts[stmtId].counter++; }
  saveCommunity(community); saveCounts(counts); updateButtons(stmtId);
}

function updateButtons(stmtId) {
  var community = getCommunity(); var counts = getCounts();
  var current = community[stmtId] || ""; var c = counts[stmtId] || { vouch: 0, counter: 0 };
  var vBtn = document.getElementById("vouch-" + stmtId);
  var cBtn = document.getElementById("counter-" + stmtId);
  if (vBtn) { vBtn.className = "react-btn" + (current === "vouch" ? " active-vouch" : ""); vBtn.innerHTML = VOUCH_ICON + "<span class='react-text'>Vouch</span>" + (c.vouch > 0 ? "<span class='react-count'>" + c.vouch + "</span>" : ""); }
  if (cBtn) { cBtn.className = "react-btn" + (current === "counter" ? " active-counter" : ""); cBtn.innerHTML = COUNTER_ICON + "<span class='react-text'>Counter</span>" + (c.counter > 0 ? "<span class='react-count'>" + c.counter + "</span>" : ""); }
}

async function loadFeed(){
  try {
    var res = await getFeed();
    var list = res.response.statements || res.response.results || [];
    if (list.length === 0) { document.getElementById("feed").innerHTML = "<div class='muted'>No posts yet.</div>"; return; }
    var community = getCommunity(); var counts = getCounts(); var html = "";
    for (var i = 0; i < list.length; i++) {
      var item = list[i]; var rawText = item.text || ""; var url = item.source_url || "";
      var created = item.Created_Date || item.created_date || "";
      var stmtId = item._id || item.id || "";
      var reaction = getReaction(item); var text = cleanText(rawText);
      var ownerId = item["Created By"] || item.created_by || item.user_id || item.creator;
      var ownerInfo = await getUserInfo(ownerId);
      var initial = (ownerInfo.name || "?").charAt(0).toUpperCase();
      var avatarHtml = ownerInfo.photo ? "<div class='avatar'><img src='" + escapeHtml(ownerInfo.photo) + "'></div>" : "<div class='avatar'>" + escapeHtml(initial) + "</div>";
      var myReaction = community[stmtId] || "";
      var c = counts[stmtId] || { vouch: 0, counter: 0 };
      var timeText = timeAgo(created);
      var following = isFollowing(ownerId);

      html += "<div class='card'>";
      // HEADER
      html += "<div class='header-row'>" + avatarHtml + "<div class='header-text'><div class='name'>" + escapeHtml(ownerInfo.name) + "</div>" + getOwnerReactionLabel(reaction) + "</div>";
      html += "<div class='header-right'>";
      if (timeText) html += "<span class='time-stamp'>" + timeText + "</span>";
      html += "<div class='menu-wrap'><button class='menu-btn' onclick=\"event.stopPropagation();toggleMenu('" + stmtId + "')\">⋯</button>";
      html += "<div class='menu-dropdown' id='menu-" + stmtId + "'>";
      html += "<button class='menu-option' onclick=\"viewProfile('" + (ownerId||"") + "')\"><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><circle cx='12' cy='12' r='10'/><circle cx='12' cy='10' r='3'/><path d='M6.168 18.849A4 4 0 0110 16h4a4 4 0 013.834 2.855'/></svg>View Profile</button>";
      html += "<div class='menu-divider'></div>";
      html += "<button class='menu-option' onclick=\"followUser('" + (ownerId||"") + "','" + escapeHtml(ownerInfo.name).replace(/'/g,"\\'") + "')\"><svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><path d='M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2'/><circle cx='8.5' cy='7' r='4'/><line x1='20' y1='8' x2='20' y2='14'/><line x1='23' y1='11' x2='17' y2='11'/></svg>" + (following ? "Unfollow" : "Follow") + "</button>";
      html += "</div></div></div></div>";

      // TEXT
      html += "<div class='stmt'>" + escapeHtml(text) + "</div>";
      // PREVIEW
      if (url) html += getPreviewHTML(url, text.length > 60 ? text.substring(0,60)+"..." : text);
      // DATE
      if (created) html += "<div class='card-date'>" + timeText + "</div>";

      // VOUCH + COUNTER
      html += "<div class='community-row'>";
      html += "<button class='react-btn" + (myReaction==="vouch" ? " active-vouch" : "") + "' id='vouch-" + stmtId + "' onclick=\"toggleCommunity('" + stmtId + "','vouch')\">" + VOUCH_ICON + "<span class='react-text'>Vouch</span>" + (c.vouch > 0 ? "<span class='react-count'>" + c.vouch + "</span>" : "") + "</button>";
      html += "<button class='react-btn" + (myReaction==="counter" ? " active-counter" : "") + "' id='counter-" + stmtId + "' onclick=\"toggleCommunity('" + stmtId + "','counter')\">" + COUNTER_ICON + "<span class='react-text'>Counter</span>" + (c.counter > 0 ? "<span class='react-count'>" + c.counter + "</span>" : "") + "</button>";
      html += "</div></div>";
    }
    document.getElementById("feed").innerHTML = html;
  } catch(err) { document.getElementById("feed").innerHTML = "<div class='muted'>Error: " + escapeHtml(err.message) + "</div>"; }
}

loadFeed();
</script>
</body>
</html>
