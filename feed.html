<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Feed — Verilay</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --navy:#0B1F3A;
      --saffron:#F59E0B;
      --bg:#F6F8FC;
      --card:#fff;
      --text:#0B1220;
      --muted:#64748B;
      --line: rgba(2,8,23,.08);
      --shadow: 0 10px 30px rgba(2,8,23,.08);
      --radius: 18px;
      --green:#16A34A;
      --amber:#D97706;
      --red:#DC2626;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .app{max-width:780px;margin:0 auto;padding-bottom:86px}
    .topbar{
      position:sticky;top:0;z-index:20;
      background:rgba(246,248,252,.85);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--line);
      padding:14px 16px;
      display:flex;align-items:center;justify-content:space-between;
    }
    .brand{
      display:flex;align-items:center;gap:10px;
      font-weight:900;letter-spacing:.10em;
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background:var(--saffron);box-shadow:0 0 0 4px rgba(245,158,11,.16);
    }
    .iconBtn{
      width:38px;height:38px;border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      display:inline-flex;align-items:center;justify-content:center;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(2,8,23,.06);
    }

    .stories{
      padding:12px 12px 6px;
      display:flex;gap:10px;overflow:auto;
      scrollbar-width:none;
    }
    .stories::-webkit-scrollbar{display:none}
    .story{
      min-width:74px;
      background:#fff;border:1px solid var(--line);
      border-radius:18px;padding:10px 10px 8px;
      box-shadow:0 8px 20px rgba(2,8,23,.05);
      text-align:center;
    }
    .avatar{
      width:44px;height:44px;border-radius:999px;
      margin:0 auto 8px;
      background: radial-gradient(circle at 30% 30%, rgba(245,158,11,.45), rgba(11,31,58,.9));
      border:2px solid rgba(245,158,11,.55);
    }
    .storyName{font-size:11px;color:var(--muted);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .composer{
      margin:10px 12px 12px;
      background:#fff;border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:12px;
    }
    .row{display:flex;gap:10px;align-items:center}
    .input, .textarea{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:10px 12px;
      font-family:inherit;
      outline:none;
    }
    .textarea{min-height:74px;resize:vertical}
    .primary{
      border:0;
      border-radius:14px;
      padding:10px 12px;
      background:var(--navy);
      color:#fff;
      font-weight:800;
      cursor:pointer;
    }
    .secondary{
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 12px;
      background:#fff;
      color:var(--text);
      font-weight:800;
      cursor:pointer;
    }

    .feed{display:grid;gap:12px;padding:0 12px}
    .post{
      background:#fff;border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .postHead{
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 12px 10px;border-bottom:1px solid var(--line);
    }
    .who{display:flex;gap:10px;align-items:center}
    .who .mini{
      width:34px;height:34px;border-radius:999px;
      background: radial-gradient(circle at 30% 30%, rgba(245,158,11,.42), rgba(11,31,58,.9));
      border:2px solid rgba(245,158,11,.45);
    }
    .handle{font-weight:900;font-size:13px}
    .time{font-size:12px;color:var(--muted);font-weight:700}
    .postBody{padding:12px}
    .text{font-size:15px;line-height:1.55;font-weight:600;margin:0 0 10px}
    .linkCard{
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      display:flex;gap:12px;
      background:#F8FAFC;
    }
    .thumb{
      width:96px;min-height:76px;
      background: linear-gradient(135deg, rgba(11,31,58,.95), rgba(245,158,11,.65));
    }
    .linkInfo{padding:10px 10px 10px 0}
    .host{font-size:12px;color:var(--muted);font-weight:800}
    .url{font-size:13px;color:#0b1220;font-weight:800;word-break:break-word}
    .actions{
      padding:10px 12px 12px;
      display:flex;gap:8px;flex-wrap:wrap;
      border-top:1px solid var(--line);
      background:#fff;
    }
    .chip{
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 10px;
      background:#fff;
      font-weight:900;
      cursor:pointer;
      display:inline-flex;align-items:center;gap:8px;
    }
    .chip.green{border-color: rgba(22,163,74,.28); background: rgba(22,163,74,.08)}
    .chip.amber{border-color: rgba(217,119,6,.30); background: rgba(217,119,6,.10)}
    .chip.red{border-color: rgba(220,38,38,.26); background: rgba(220,38,38,.08)}
    .status{
      padding:0 12px 12px;
