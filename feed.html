<!DOCTYPE html>
<html>
<head>
  <title>Feed - Verilay</title>

  <style>
    body {
      font-family: Arial;
      background: #F8FAFC;
      margin: 0;
    }

    .header {
      background: #0B1F3A;
      color: white;
      padding: 15px;
      text-align: centre;
    }

    .feed {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    .post {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .actions button {
      margin-right: 10px;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .accept { background: #DCFCE7; }
    .deny { background: #FEE2E2; }
    .modify { background: #FEF3C7; }

    .active {
      border: 2px solid black;
    }

    iframe {
      width: 100%;
      height: 200px;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="header">Verilay Feed</div>

<div class="feed">
  <div class="post">
    <b>@username</b>
    <p>"We have signed a partnership"</p>

    <iframe src="https://example.com"></iframe>

    <div class="actions">
      <button class="accept" onclick="react(this)">Accept</button>
      <button class="modify" onclick="react(this)">Modify</button>
      <button class="deny" onclick="react(this)">Deny</button>
    </div>

    <small id="status"></small>
  </div>
</div>

<script>
function react(btn) {
  let parent = btn.parentElement;
  let buttons = parent.querySelectorAll("button");

  buttons.forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  let status = btn.innerText;
  parent.nextElementSibling.innerText = "You marked this as " + status;
}
</script>

</body>
</html>
