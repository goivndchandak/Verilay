<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feed - Verilay</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  background:#fafafa;
  padding:10px;
  padding-bottom:70px;
}

/* ✅ TOP BAR */
.topbar {
  background:#1d3557;
  color:white;
  padding:14px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  margin-bottom:10px;
}

/* ✅ CARD */
.card {
  background:white;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
}

/* ✅ IMAGE PREVIEW */
.preview img {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
  margin-top:10px;
}

/* ✅ BUTTONS */
.btn {
  padding:8px 12px;
  border:none;
  border-radius:20px;
  color:white;
  margin:4px;
  cursor:pointer;
}

.accept { background:#2d6a4f;}
.modify { background:#f77f00;}
.deny   { background:#d62828;}

/* ✅ CARD BUTTON */
.gen-card {
  background:#FF9933;
  color:white;
  padding:6px 14px;
  border-radius:20px;
  text-decoration:none;
  display:inline-block;
  margin-top:8px;
}

/* ✅ BOTTOM NAV (LIGHT SAFFRON) */
.bottomnav {
 position:fixed;
 bottom:0;
 left:0;
 right:0;
 background:#fff4e6;
 display:flex;
 justify-content:space-around;
 height:60px;
 border-top:1px solid #eee;
 align-items:center;
}

.bottomnav a {
  text-decoration:none;
  font-size:22px;
}

</style>
</head>

<body>

<!-- ✅ TOP BAR -->
<div class="topbar">Verilay</div>

<div id="feed"></div>

<!-- ✅ BOTTOM NAV -->
<div class="bottomnav">
  <a href="feed.html">🏠</a>
  <a href="dashboard.html">👤</a>
</div>

<script src="js/api.js"></script>

<script>

const myUserId = localStorage.getItem("user_id");
let myProfile = {};

/* ---------- LOAD PROFILE ---------- */
async function loadProfile(){
  const res = await getProfile();
  myProfile = res.response || {};
}

/* ---------- IMAGE PREVIEW (ALWAYS SHOW) ---------- */
function getPreviewHTML(url){

  if(!url) return "";

  if(!url.startsWith("http")){
    url = "https://" + url;
  }

  const image = "https://image.thum.io/get/" + url;

  return `
    <div class="preview">
      <img src="${image}">
      <a href="${url}" target="_blank">${url}</a>
    </div>
  `;
}

/* ---------- LOAD FEED ---------- */
async function loadFeed(){

  const res = await getFeed();
  const list = res.response.statements || res.response.results || [];

  let html = "";

  list.forEach(item => {

    const id = item._id || item.id;
    const text = item.text || "";
    const url = item.source_url || "";
    const owner = item["Created By"] || item.created_by || item.user_id;

    const isOwner = (owner == myUserId);

    html += `<div class="card">`;

    html += `<p>${text}</p>`;

    /* ✅ IMAGE PREVIEW */
    if(url){
      html += getPreviewHTML(url);
    }

    /* ✅ ONLY OWNER CAN REACT */
    if(isOwner){
      html += `
        <div id="action-${id}">
          <button class="btn accept" onclick="react('${id}','accepted','${encodeURIComponent(text)}')">Accept</button>
          <button class="btn modify" onclick="react('${id}','modified','${encodeURIComponent(text)}')">Modify</button>
          <button class="btn deny" onclick="react('${id}','denied','${encodeURIComponent(text)}')">Deny</button>
        </div>

        <div id="result-${id}"></div>
      `;
    }

    html += `</div>`;
  });

  document.getElementById("feed").innerHTML = html;
}

/* ---------- REACT ---------- */
async function react(id,action,text){

  await reactStatement(id, action);

  /* hide buttons */
  document.getElementById("action-"+id).style.display="none";

  /* show result + generate card */
  document.getElementById("result-"+id).innerHTML =
    `Marked ${action}
     <br>
     <a class="gen-card" href="card.html?name=${encodeURIComponent(myProfile.full_name)}&username=${encodeURIComponent(myProfile.username)}&text=${text}&verdict=${action}">
     Generate Card
     </a>`;
}

/* ---------- INIT ---------- */
loadProfile();
loadFeed();

</script>

</body>
</html>
``
