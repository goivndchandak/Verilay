<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Verilay – Profile</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#1a1a2e;padding-bottom:70px}

    .header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
    .logo{color:#e8a838;font-size:22px;font-weight:800;letter-spacing:4px}
    .logout-btn{background:transparent;border:2px solid #e8a838;color:#e8a838;padding:6px 18px;border-radius:20px;font-weight:800;cursor:pointer}

    .profile{background:#fff;text-align:center;padding:22px 16px 14px}
    .avatar{width:78px;height:78px;border-radius:50%;background:#1a1a2e;color:#e8a838;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;margin:0 auto 8px}
    .username{font-size:18px;font-weight:900}

    .tabs{display:flex;background:#fff;border-bottom:2px solid #eee}
    .tab{flex:1;text-align:center;padding:12px 6px;font-size:13px;font-weight:900;color:#888;cursor:pointer;border-bottom:3px solid transparent}
    .tab.active{color:#e8a838;border-bottom-color:#e8a838}

    .tab-content{display:none;padding:16px}
    .tab-content.active{display:block}

    .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .stmt{font-size:15px;line-height:1.5;margin-bottom:8px}
    .source{color:#e8a838;text-decoration:none;font-weight:800;font-size:13px}
    .meta{margin-top:8px}
    .badge{display:inline-block;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:900}
    .b-accepted{background:#e6f9e6;color:#2e7d32}
    .b-modified{background:#fff3e0;color:#e65100}
    .b-denied{background:#ffebee;color:#c62828}
    .b-pending{background:#f2f2f2;color:#777}

    .post-form{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    textarea{width:100%;border:1px solid #ddd;border-radius:10px;padding:12px;font-size:15px;min-height:90px;font-family:inherit}
    input{width:100%;border:1px solid #ddd;border-radius:10px;padding:12px;font-size:14px;margin-top:10px;font-family:inherit}
    .btn{width:100%;background:#1a1a2e;color:#fff;border:none;padding:13px;border-radius:10px;font-weight:900;cursor:pointer;margin-top:12px}
    #postStatus{margin-top:8px;text-align:center;font-size:14px}

    .loading{text-align:center;padding:28px;color:#888}
    .empty{text-align:center;padding:40px 20px;color:#aaa}
    .error-msg{color:#c62828;text-align:center;padding:18px}

    /* News cards */
    .ncard{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .ncard img{width:100%;height:180px;object-fit:cover}
    .nbody{padding:12px}
    .ntitle{font-size:15px;font-weight:900;margin-bottom:6px}
    .ndesc{font-size:13px;color:#666;margin-bottom:8px}
    .nsrc{font-size:12px;color:#e8a838;font-weight:900;margin-bottom:6px}
