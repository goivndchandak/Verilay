<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #F8FAFC;
      margin: 0;
    }

    .profile {
      background: white;
      padding: 20px;
      text-align: centre;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .actions {
      margin: 20px;
      text-align: centre;
    }

    textarea {
      width: 80%;
      height: 80px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="profile">
  <h2>@username</h2>
  <p>Verilay Score: 72</p>
  <p>Statements: 12</p>
</div>

<div class="actions">
  <h3>Post Statement</h3>
  <textarea id="statement"></textarea><br>
  <button onclick="post()">Post</button>

  <div id="reaction" style="display:none;">
    <h4>React:</h4>
    <button onclick="select('Accepted')">✅</button>
    <button onclick="select('Modified')">✏️</button>
    <button onclick="select('Denied')">❌</button>

    <p id="result"></p>
  </div>
</div>

<script>
function post() {
  document.getElementById("reaction").style.display = "block";
}

function select(val) {
  document.getElementById("result").innerText = "Marked as " + val;
}
</script>

</body>
</html>
