<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile - Verilay</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #fafafa; padding-bottom: 70px; }

.topbar {
  background: #1d3557;
  color: white;
  padding: 15px 20px;
  font-size: 20px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
}

.content { max-width: 600px; margin: 0 auto; padding: 15px; }

.profile-header {
  background: white;
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  margin-bottom: 15px;
}

.avatar {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: #1d3557;
  color: white;
  font-size: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 10px;
}

.stats {
  display: flex;
  justify-content: space-around;
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

.tabs { display: flex; background: white; border-radius: 12px; margin-bottom: 15px; }
.tab { flex:1; padding:12px; text-align:center; cursor:pointer; font-weight:bold; color:#999; }
.tab.active { color:#1d3557; border-bottom:3px solid #1d3557; }

.section { display:none; }
.section.active { display:block; }

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:12px;
}

.btn {
  padding: 12px;
  background: #1d3557;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.result-row { margin-top: 10px; }

.gen-card-btn {
  background: #FF9933;
  color: white;
  padding: 6px 12px;
  border-radius: 20px;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="topbar">
  My Profile
  <button onclick="logout()">Logout</button>
</div>

<div class="content">

<div class="profile-header">
  <div class="avatar" id="avatarInitial">?</div>
  <h2 id="profileName">Loading...</h2>
  <p id="profileUsername">@...</p>
</div>

<div class="stats">
  <div><b id="statStatements">0</b><br>Statements</div>
  <div><b id="statScore">0</b><br>Score</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('statements')">Statements</div>
  <div class="tab" onclick="showTab('post')">New</div>
  <div class="tab" onclick="showTab('news')">News</div>
</div>

<!-- Statements -->
<div id="sec-statements" class="section active">
  <div id="myStatements"></div>
</div>

<!-- Post -->
<div id="sec-post" class="section">
  <div class="card">
    <textarea id="newStatement" placeholder="Write..." rows="4"></textarea>
    <input id="sourceUrl" placeholder="Optional source url">
    <button class="btn" onclick="postStatement()">Post</button>

    <div id="postReactSection" style="display:none;">
      <br>
      <button onclick="reactToPost('accepted')">Accept</button>
      <button onclick="reactToPost('modified')">Modify</button>
      <button onclick="reactToPost('denied')">Deny</button>
      <div id="postReactResult"></div>
    </div>
  </div>
</div>

<!-- News -->
<div id="sec-news" class="section">
  <input id="newsQuery">
  <button onclick="scanNews()">Scan</button>
  <div id="newsResults"></div>
</div>

</div>

<script src="js/api.js"></script>

<script>

if (!localStorage.getItem("token")) {
  window.location.href = "login.html";
}

var lastPostedId = "";
var lastPostedText = "";

/* ---------- TAB ---------- */
function showTab(name){
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
}

/* ---------- LOAD PROFILE ---------- */
async function loadProfile(){
  const res = await getProfile();
  const user = res.response || {};

  document.getElementById("profileName").innerText = user.full_name || "";
  document.getElementById("profileUsername").innerText = "@"+(user.username || "");
  document.getElementById("avatarInitial").innerText = (user.full_name||"?")[0];
}

/* ---------- LOAD STATEMENTS ---------- */
async function loadMyStatements(){
  const res = await getMyStatements();
  const list = res.response || [];
  document.getElementById("statStatements").innerText = list.length;

  let html = "";
  list.forEach(item=>{
    const id = item._id;

    html += `
      <div class="card">
        <p>${item.text}</p>

        <button onclick="reactToStatement('${id}','accepted')">✅</button>
        <button onclick="reactToStatement('${id}','modified')">✏️</button>
        <button onclick="reactToStatement('${id}','denied')">❌</button>

        <div id="r-${id}"></div>
      </div>
    `;
  });

  document.getElementById("myStatements").innerHTML = html;
}

/* ---------- POST ---------- */
async function postStatement(){
  const text = document.getElementById("newStatement").value;
  const url = document.getElementById("sourceUrl").value;

  if(!text) return alert("write something");

  const res = await addStatement(text, url);

  // ✅ FIXED ID LOGIC
  lastPostedId = "";
  if (res.response) {
    lastPostedId = res.response.id || res.response._id || "";
  }
  if (res.id) lastPostedId = res.id;
  if (res._id) lastPostedId = res._id;

  lastPostedText = text;

  document.getElementById("postReactSection").style.display = "block";
}

/* ---------- REACT POST ---------- */
async function reactToPost(action){
  if(!lastPostedId) return alert("no ID");

  await reactStatement(lastPostedId, action);

  document.getElementById("postReactResult").innerHTML =
    `Marked ${action}`;

  loadMyStatements();
}

/* ---------- REACT STATEMENT ---------- */
async function reactToStatement(id,action){
  await reactStatement(id,action);
  document.getElementById("r-"+id).innerHTML = "Marked "+action;
}

/* ---------- NEWS ---------- */
async function scanNews(){
  const res = await searchNews(document.getElementById("newsQuery").value);
  const list = res.articles || [];

  let html = "";

  list.forEach((n,i)=>{
    const id = "n"+i;

    html += `
      <div class="card">
        <p>${n.title}</p>

        <button onclick="reactToNews('${id}','accepted')">✅</button>
        <button onclick="reactToNews('${id}','modified')">✏️</button>
        <button onclick="reactToNews('${id}','denied')">❌</button>

        <div id="nr-${id}"></div>
      </div>
    `;

    window[id] = n;
  });

  document.getElementById("newsResults").innerHTML = html;
}

/* ---------- FIXED NEWS REACT ---------- */
async function reactToNews(id,action){
  const n = window[id];

  const res = await addStatement(n.title, n.url);

  // ✅ FIXED ID HANDLING
  let stmtId = "";
  if (res.response) {
    stmtId = res.response.id || res.response._id || "";
  }
  if (res.id) stmtId = res.id;
  if (res._id) stmtId = res._id;

  if(stmtId){
    await reactStatement(stmtId, action);
  }

  document.getElementById("nr-"+id).innerText = "Marked "+action;
}

/* ---------- LOGOUT ---------- */
function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

/* ---------- INIT ---------- */
loadProfile();
loadMyStatements();

</script>

</body>
</html>
