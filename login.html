<!DOCTYPE html>
<html>
<head>
  <title>Login - Verilay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #faf5eb; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { background: #1d3557; padding: 16px 20px; text-align: center; border-bottom: 4px solid #FF9933; }
    .topbar a { color: #FF9933; font-size: 22px; font-weight: bold; letter-spacing: 4px; text-decoration: none; }
    .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card { background: white; border-radius: 16px; padding: 40px 30px; max-width: 400px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
    .card h2 { color: #1d3557; font-size: 24px; margin-bottom: 8px; }
    .card p { color: #999; font-size: 13px; margin-bottom: 25px; }
    .form-group { margin-bottom: 15px; text-align: left; }
    .form-group label { font-size: 12px; color: #666; display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .form-group input:focus { outline: none; border-color: #FF9933; }
    .btn { width: 100%; padding: 14px; background: #1d3557; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn:hover { background: #0d1b2a; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .error { color: red; font-size: 12px; margin-top: 10px; }
    .success { color: green; font-size: 12px; margin-top: 10px; }
    .link { margin-top: 20px; font-size: 13px; color: #666; }
    .link a { color: #FF9933; font-weight: bold; text-decoration: none; }
    .footer { background: #1d3557; padding: 12px; text-align: center; border-top: 4px solid #FF9933; }
    .footer span { color: #FF9933; font-size: 12px; letter-spacing: 1px; }
  </style>
</head>
<body>
<div class="topbar"><a href="index.html">VERILAY</a></div>
<div class="container">
  <div class="card">
    <h2>Welcome Back</h2>
    <p>Login to your Verilay account</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password">
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Login</button>
    <div id="errorMsg" class="error"></div>
    <div id="successMsg" class="success"></div>
    <div class="link">Don't have an account? signup.html</div>
  </div>
</div>
<div class="footer"><span>VERILAY - The layer of truth internet needs</span></div>
"></script>
<script>
if (localStorage.getItem("token")) { window.location.href = "dashboard.html"; }

async function doLogin() {
  var email = document.getElementById("email").value.trim();
  var password = document.getElementById("password").value;
  var errorMsg = document.getElementById("errorMsg");
  var successMsg = document.getElementById("successMsg");
  var btn = document.getElementById("loginBtn");
  errorMsg.innerText = "";
  successMsg.innerText = "";
  if (!email) { errorMsg.innerText = "Enter your email"; return; }
  if (!password) { errorMsg.innerText = "Enter your password"; return; }
  btn.disabled = true;
  btn.innerText = "Logging in...";
  try {
    await login(email, password);
    successMsg.innerText = "Login successful! Redirecting...";
    setTimeout(function() { window.location.href = "feed.html"; }, 1000);
  } catch (err) {
    errorMsg.innerText = "Error: " + err.message;
    btn.disabled = false;
    btn.innerText = "Login";
  }
}
</script>
</body>
</html>
