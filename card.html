<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verilay'd Card</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f5f5; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

.vcard { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.12); max-width: 380px; width: 100%; }
.vc-header { background: #1d3557; padding: 14px; text-align: center; }
.vc-header h2 { color: white; font-size: 18px; letter-spacing: 5px; margin: 0; }
.vc-accent { height: 4px; background: #FF9933; }
.vc-body { padding: 28px 24px; text-align: center; }

/* ✅ USER STATEMENT — ABOVE STAMP */
.vc-statement {
  font-size: 14px; color: #333; font-style: italic;
  line-height: 1.6; margin-bottom: 24px;
  position: relative; padding: 0 10px;
}
.vc-statement::before { content: '\201C'; font-size: 28px; color: #FF9933; font-weight: bold; position: absolute; left: -4px; top: -8px; }
.vc-statement::after { content: '\201D'; font-size: 28px; color: #FF9933; font-weight: bold; }

/* ✅ STAMP WITH REACTION TEXT INSIDE */
.vc-seal {
  width: 120px; height: 120px; border: 3px solid;
  border-radius: 50%; margin: 0 auto 20px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
}
.vc-seal::before {
  content: ''; position: absolute;
  width: 140px; height: 140px;
  border: 1px dashed; border-radius: 50%; opacity: 0.3;
}
.vc-seal-icon { font-size: 30px; line-height: 1; margin-bottom: 4px; }
.vc-seal-text { font-size: 10px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; }

/* VERDICT COLORS */
.verdict-accepted .vc-seal { border-color: #2d6a4f; }
.verdict-accepted .vc-seal::before { border-color: #2d6a4f; }
.verdict-accepted .vc-seal-icon { color: #2d6a4f; }
.verdict-accepted .vc-seal-text { color: #2d6a4f; }

.verdict-modified .vc-seal { border-color: #c47a1a; }
.verdict-modified .vc-seal::before { border-color: #c47a1a; }
.verdict-modified .vc-seal-icon { color: #c47a1a; }
.verdict-modified .vc-seal-text { color: #c47a1a; }

.verdict-denied .vc-seal { border-color: #b84040; }
.verdict-denied .vc-seal::before { border-color: #b84040; }
.verdict-denied .vc-seal-icon { color: #b84040; }
.verdict-denied .vc-seal-text { color: #b84040; }

/* USER INFO */
.vc-name { font-size: 15px; color: #1d3557; font-weight: bold; }

/* ✅ NEWS SOURCE — BELOW NAME */
.vc-news {
  margin-top: 12px; padding: 10px 14px;
  background: #f8f9fb; border: 1px solid #eef1f5;
  border-radius: 10px; text-align: left;
}
.vc-news-label { font-size: 9px; color: #999; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 4px; }
.vc-news-title { font-size: 12px; color: #1d3557; font-weight: 600; line-height: 1.4; }
.vc-news-source { font-size: 10px; color: #b0b8c4; margin-top: 3px; }

.vc-date { font-size: 11px; color: #bbb; margin-top: 14px; }

.vc-footer { background: #1d3557; padding: 10px; text-align: center; }
.vc-footer span { color: #FFD699; font-size: 11px; letter-spacing: 1.5px; }

/* ACTIONS */
.actions { max-width: 380px; width: 100%; margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.dl-btn { padding: 12px 24px; background: #1d3557; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
.dl-btn:hover { background: #15293f; }
.share-btn { padding: 12px 24px; background: white; color: #1d3557; border: 1px solid #1d3557; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
.share-btn:hover { background: #1d3557; color: white; }
.back-link { margin-top: 16px; font-size: 13px; color: #888; text-decoration: none; }
.back-link:hover { color: #1d3557; }
</style>
</head>
<body>

<div class="vcard" id="verilayCard">
  <div class="vc-header"><h2>VERILAY'D</h2></div>
  <div class="vc-accent"></div>
  <div class="vc-body" id="vcBody"></div>
  <div class="vc-footer"><span>#Verilayd · verilay.co.in</span></div>
</div>

<div class="actions">
  <button class="dl-btn" onclick="downloadCard()">📥 Download</button>
  <a class="share-btn" id="shareLink" href="#" target="_blank">📤 Share</a>
</div>
<a class="back-link" href="dashboard.html">← Back to Profile</a>

<script>
var params = new URLSearchParams(window.location.search);
var name = params.get("name") || "User";
var text = params.get("text") || "";
var verdict = (params.get("verdict") || "accepted").toLowerCase();
var newsTitle = params.get("news") || "";
var newsSource = params.get("source") || "";

var icons = { accepted: "✓", modified: "✎", denied: "✗" };
var labels = { accepted: "ACCEPTED", modified: "MODIFIED", denied: "DENIED" };
var icon = icons[verdict] || "✓";
var label = labels[verdict] || "ACCEPTED";

var body = document.getElementById("vcBody");
document.querySelector(".vcard").classList.add("verdict-" + verdict);

var cleanedText = text.replace(/^(ACCEPTED|MODIFIED|DENIED|ACCEPT|MODIFY|DENY):\s*/i, "").trim();

var html = "";

// ✅ USER STATEMENT — ABOVE STAMP
if (cleanedText) {
  html += "<div class='vc-statement'>" + escapeHtml(cleanedText) + "</div>";
}

// ✅ STAMP — ICON + REACTION TEXT INSIDE
html += "<div class='vc-seal'>";
html += "<div class='vc-seal-icon'>" + icon + "</div>";
html += "<div class='vc-seal-text'>" + label + "</div>";
html += "</div>";

// ✅ NAME (no username)
html += "<div class='vc-name'>by " + escapeHtml(name) + "</div>";

// ✅ NEWS SOURCE — BELOW NAME
if (newsTitle) {
  html += "<div class='vc-news'>";
  html += "<div class='vc-news-label'>Reacting to</div>";
  html += "<div class='vc-news-title'>" + escapeHtml(newsTitle) + "</div>";
  if (newsSource) {
    var domain = newsSource;
    try { domain = new URL(newsSource).hostname.replace("www.", ""); } catch(e) {}
    html += "<div class='vc-news-source'>via " + escapeHtml(domain) + "</div>";
  }
  html += "</div>";
}

// DATE
html += "<div class='vc-date'>" + new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) + "</div>";

body.innerHTML = html;

// SHARE LINK
var shareText = name + " " + label.toLowerCase() + " this on Verilay";
if (cleanedText) shareText += ': "' + cleanedText + '"';
document.getElementById("shareLink").href = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(shareText + " #Verilayd") + "&url=" + encodeURIComponent("https://verilay.co.in");

function escapeHtml(s) { return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function downloadCard() { alert("Screenshot this card to save! 📸\n\nFull download feature coming soon."); }
</script>
</body>
</html>
