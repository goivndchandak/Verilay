<!DOCTYPE html>
<html>
<head>
  <title>Verilay Card</title>

  <style>
    body {
      background: #0B1F3A;
      display: flex;
      justify-content: centre;
      align-items: centre;
      height: 100vh;
      font-family: Arial;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 300px;
      text-align: centre;
    }

    .status {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .statement {
      font-size: 18px;
      margin: 20px 0;
    }

    .user {
      colour: grey;
    }
  </style>
</head>

<body>

<div class="card">
  <div class="status">✅ ACCEPTED</div>

  <div class="statement">
    "Partnership confirmed"
  </div>

  <div class="user">
    — @username
  </div>

</div>

</body>
</html>
